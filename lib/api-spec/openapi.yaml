openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: NGO Decision & Action System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ngo
    description: NGO data extraction, prioritization, action planning and volunteer matching
  - name: volunteers
    description: Volunteer management
  - name: reports
    description: Report history and analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /ngo/analyze:
    post:
      operationId: analyzeNgoData
      tags: [ngo]
      summary: Analyze messy NGO field data using Gemini AI
      description: Takes raw unstructured input (field notes, WhatsApp messages, reports) and returns structured needs with priorities, action plans, and volunteer matching
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeNgoDataBody"
      responses:
        "200":
          description: Structured analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /ngo/reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List all analysis reports
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReportSummary"
    post:
      operationId: saveReport
      tags: [reports]
      summary: Save an analysis report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveReportBody"
      responses:
        "201":
          description: Saved report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"

  /ngo/reports/{id}:
    get:
      operationId: getReport
      tags: [reports]
      summary: Get a specific report with full details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteReport
      tags: [reports]
      summary: Delete a report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /ngo/stats:
    get:
      operationId: getNgoStats
      tags: [ngo]
      summary: Get NGO dashboard stats
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NgoStats"

  /volunteers:
    get:
      operationId: listVolunteers
      tags: [volunteers]
      summary: List all volunteers
      responses:
        "200":
          description: List of volunteers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Volunteer"
    post:
      operationId: createVolunteer
      tags: [volunteers]
      summary: Add a volunteer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVolunteerBody"
      responses:
        "201":
          description: Created volunteer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Volunteer"

  /volunteers/{id}:
    put:
      operationId: updateVolunteer
      tags: [volunteers]
      summary: Update a volunteer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVolunteerBody"
      responses:
        "200":
          description: Updated volunteer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Volunteer"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteVolunteer
      tags: [volunteers]
      summary: Delete a volunteer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AnalyzeNgoDataBody:
      type: object
      properties:
        rawInput:
          type: string
          description: Raw unstructured text from field notes, WhatsApp messages, or reports
        volunteerIds:
          type: array
          items:
            type: integer
          description: Optional list of volunteer IDs to use for matching
      required:
        - rawInput

    ExtractedNeed:
      type: object
      properties:
        location:
          type: string
        state:
          type: string
        needType:
          type: string
          description: "water, food, health, education, shelter, etc."
        urgency:
          type: string
          description: "high, medium, or low"
        peopleAffected:
          type: integer
        priorityScore:
          type: number
        priorityExplanation:
          type: string
        riskIfDelayed:
          type: string
        actionPlan:
          type: string
        volunteersRequired:
          type: integer
        timeframe:
          type: string
        impactSummary:
          type: string
        expectedResolutionTime:
          type: string
        severityReduction:
          type: string
        matchedVolunteers:
          type: array
          items:
            $ref: "#/components/schemas/VolunteerMatch"
      required:
        - location
        - state
        - needType
        - urgency
        - peopleAffected
        - priorityScore
        - priorityExplanation
        - riskIfDelayed
        - actionPlan
        - volunteersRequired
        - timeframe
        - impactSummary
        - expectedResolutionTime
        - severityReduction
        - matchedVolunteers

    VolunteerMatch:
      type: object
      properties:
        volunteerId:
          type: ["integer", "null"]
        volunteerName:
          type: string
        matchScore:
          type: number
        skillMatch:
          type: string
        locationRelevance:
          type: string
        availability:
          type: string
        assignmentNote:
          type: string
      required:
        - volunteerName
        - matchScore
        - skillMatch
        - locationRelevance
        - availability
        - assignmentNote

    AnalysisResult:
      type: object
      properties:
        rawInput:
          type: string
        extractedNeeds:
          type: array
          items:
            $ref: "#/components/schemas/ExtractedNeed"
        topPriority:
          $ref: "#/components/schemas/ExtractedNeed"
        analysisNote:
          type: string
      required:
        - rawInput
        - extractedNeeds
        - topPriority
        - analysisNote

    SaveReportBody:
      type: object
      properties:
        title:
          type: string
        rawInput:
          type: string
        analysisResult:
          type: string
          description: JSON stringified AnalysisResult
      required:
        - title
        - rawInput
        - analysisResult

    ReportSummary:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        needsCount:
          type: integer
        topUrgency:
          type: string
      required:
        - id
        - title
        - createdAt
        - needsCount
        - topUrgency

    Report:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        rawInput:
          type: string
        analysisResult:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - rawInput
        - analysisResult
        - createdAt

    NgoStats:
      type: object
      properties:
        totalReports:
          type: integer
        totalVolunteers:
          type: integer
        highUrgencyCount:
          type: integer
        totalPeopleHelped:
          type: integer
        recentReports:
          type: array
          items:
            $ref: "#/components/schemas/ReportSummary"
      required:
        - totalReports
        - totalVolunteers
        - highUrgencyCount
        - totalPeopleHelped
        - recentReports

    Volunteer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        skills:
          type: string
          description: Comma-separated skill tags
        location:
          type: string
        state:
          type: string
        available:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - skills
        - location
        - state
        - available
        - createdAt

    CreateVolunteerBody:
      type: object
      properties:
        name:
          type: string
        skills:
          type: string
        location:
          type: string
        state:
          type: string
        available:
          type: boolean
      required:
        - name
        - skills
        - location
        - state
        - available
